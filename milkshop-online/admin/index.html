<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — MilkShop Admin</title>
  <meta name="description" content="Trang tổng quan quản trị MilkShop — xem thống kê sản phẩm, đơn hàng và doanh thu">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="../assets/css/common.css" rel="stylesheet">
  <link href="../assets/css/admin.css" rel="stylesheet">
</head>
<body>

  <div class="admin-wrapper">
    <!-- Sidebar inject by admin.js -->

    <div class="admin-main">
      <!-- Topbar inject by admin.js -->

      <div class="admin-content">

        <!-- Thẻ thống kê tổng quan -->
        <div class="row g-4 mb-4">
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statTotal">0</div>
                <div class="admin-stat-label">Tổng sản phẩm</div>
              </div>
              <div class="admin-stat-icon bg-blue"><i class="fas fa-box"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statConHang">0</div>
                <div class="admin-stat-label">Còn hàng</div>
              </div>
              <div class="admin-stat-icon bg-green"><i class="fas fa-check-circle"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statHetHang">0</div>
                <div class="admin-stat-label">Hết hàng</div>
              </div>
              <div class="admin-stat-icon bg-red"><i class="fas fa-times-circle"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statOrders">0</div>
                <div class="admin-stat-label">Đơn hàng</div>
              </div>
              <div class="admin-stat-icon bg-amber"><i class="fas fa-receipt"></i></div>
            </div>
          </div>
        </div>

        <!-- Row 2: Doanh thu + Danh mục -->
        <div class="row g-4 mb-4">
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statRevenue">0₫</div>
                <div class="admin-stat-label">Tổng doanh thu</div>
              </div>
              <div class="admin-stat-icon bg-purple"><i class="fas fa-coins"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statCategories">0</div>
                <div class="admin-stat-label">Danh mục</div>
              </div>
              <div class="admin-stat-icon bg-blue"><i class="fas fa-tags"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statBrands">0</div>
                <div class="admin-stat-label">Nhãn hàng</div>
              </div>
              <div class="admin-stat-icon bg-green"><i class="fas fa-copyright"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statExpiring">0</div>
                <div class="admin-stat-label">Sắp hết hạn</div>
              </div>
              <div class="admin-stat-icon bg-red"><i class="fas fa-exclamation-triangle"></i></div>
            </div>
          </div>
        </div>

        <!-- Row 3: Sắp hết kho -->
        <div class="row g-4 mb-4">
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value text-danger" id="statLowStock">0</div>
                <div class="admin-stat-label">Sắp hết kho (≤5)</div>
              </div>
              <div class="admin-stat-icon bg-red"><i class="fas fa-warehouse"></i></div>
            </div>
          </div>
        </div>

        <!-- Row 3: 2 bảng song song -->
        <div class="row g-4">
          <!-- Bảng 1: Sản phẩm sắp hết hạn -->
          <div class="col-lg-7">
            <div class="admin-table-card">
              <div class="admin-table-header">
                <h6><i class="fas fa-exclamation-triangle me-2 text-danger"></i>Sản phẩm sắp hết hạn</h6>
                <a href="products.html" class="btn btn-sm btn-outline-primary">Xem tất cả</a>
              </div>
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Sản phẩm</th>
                    <th>Danh mục</th>
                    <th>Giá</th>
                    <th>HSD</th>
                    <th>Còn lại</th>
                  </tr>
                </thead>
                <tbody id="expiringProducts">
                  <tr><td colspan="5" class="text-center text-muted py-4">Đang tải...</td></tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- Bảng 2: Đơn hàng gần đây -->
          <div class="col-lg-5">
            <div class="admin-table-card">
              <div class="admin-table-header">
                <h6><i class="fas fa-shopping-bag me-2 text-primary"></i>Đơn hàng gần đây</h6>
                <a href="orders.html" class="btn btn-sm btn-outline-primary">Xem tất cả</a>
              </div>
              <table class="admin-table">
                <thead>
                  <tr>
                    <th>Mã đơn</th>
                    <th>Ngày</th>
                    <th>Tổng tiền</th>
                  </tr>
                </thead>
                <tbody id="recentOrders">
                  <tr><td colspan="3" class="text-center text-muted py-4">Đang tải...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Row 4: Quản lý dữ liệu (chuyển từ Statistics) -->
        <div class="row g-4 mt-1">
          <div class="col-12">
            <div class="admin-table-card">
              <div class="admin-table-header">
                <h6><i class="fas fa-database me-2 text-info"></i>Quản lý dữ liệu</h6>
              </div>
              <div class="d-flex flex-wrap gap-3 p-3">
                <button class="btn btn-outline-primary" id="btnExportJSON">
                  <i class="fas fa-download me-2"></i>Export JSON
                </button>
                <label class="btn btn-outline-success mb-0" for="importFile">
                  <i class="fas fa-upload me-2"></i>Import JSON
                </label>
                <input type="file" id="importFile" accept=".json" class="d-none">
                <button class="btn btn-outline-danger" id="btnClearAll">
                  <i class="fas fa-trash-alt me-2"></i>Xóa tất cả dữ liệu
                </button>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../assets/js/storage-service.js"></script>
  <script src="../assets/js/app-core.js"></script>
  <script src="../assets/js/admin-layout.js"></script>
  <script src="../assets/js/admin-dashboard.js"></script>
</body>
</html>
