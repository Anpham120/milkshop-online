<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý mã giảm giá — MilkShop Admin</title>
  <meta name="description" content="Quản lý và tạo mã giảm giá coupon — MilkShop Admin">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="../assets/css/common.css" rel="stylesheet">
  <link href="../assets/css/admin.css" rel="stylesheet">
</head>
<body>

  <div class="admin-wrapper">
    <div class="admin-main">
      <div class="admin-content">

        <!-- Stat cards -->
        <div class="row g-4 mb-4">
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statTotal">0</div>
                <div class="admin-stat-label">Tổng coupon</div>
              </div>
              <div class="admin-stat-icon bg-blue"><i class="fas fa-ticket-alt"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statActive">0</div>
                <div class="admin-stat-label">Đang hoạt động</div>
              </div>
              <div class="admin-stat-icon bg-green"><i class="fas fa-check-circle"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statUsed">0</div>
                <div class="admin-stat-label">Tổng lượt dùng</div>
              </div>
              <div class="admin-stat-icon bg-orange"><i class="fas fa-chart-bar"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statExpired">0</div>
                <div class="admin-stat-label">Đã hết hạn</div>
              </div>
              <div class="admin-stat-icon bg-red"><i class="fas fa-calendar-times"></i></div>
            </div>
          </div>
        </div>

        <!-- Bảng coupon -->
        <div class="admin-table-card">
          <div class="admin-table-header">
            <h6><i class="fas fa-ticket-alt me-2"></i>Danh sách mã giảm giá</h6>
            <div class="admin-table-toolbar">
              <div class="admin-search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" class="admin-search-input" id="searchInput" placeholder="Tìm mã coupon...">
              </div>
              <select class="form-select form-select-sm admin-filter-select" id="filterType" aria-label="Lọc theo loại giảm giá">
                <option value="">Tất cả loại</option>
                <option value="percent">Giảm %</option>
                <option value="fixed">Giảm tiền</option>
              </select>
              <select class="form-select form-select-sm admin-filter-select" id="filterStatus" aria-label="Lọc theo trạng thái">
                <option value="">Tất cả trạng thái</option>
                <option value="active">Đang hoạt động</option>
                <option value="inactive">Đã tắt</option>
                <option value="expired">Hết hạn</option>
              </select>
              <button class="btn-admin-primary" id="btnAddCoupon">
                <i class="fas fa-plus"></i> Thêm coupon
              </button>
            </div>
          </div>

          <div class="admin-table-scroll">
            <table class="admin-table" id="couponTable">
              <thead>
                <tr>
                  <th>Mã coupon</th>
                  <th>Loại</th>
                  <th>Giá trị</th>
                  <th>Đơn tối thiểu</th>
                  <th>Lượt dùng</th>
                  <th>Hạn sử dụng</th>
                  <th>Trạng thái</th>
                  <th class="admin-th-actions">Hành động</th>
                </tr>
              </thead>
              <tbody id="couponTableBody"></tbody>
            </table>
          </div>

          <div class="admin-table-footer">
            <span id="tableInfo">Hiển thị 0 coupon</span>
            <nav>
              <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
            </nav>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Modal thêm/sửa coupon -->
  <div class="modal fade" id="couponModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="couponModalTitle"><i class="fas fa-ticket-alt me-2"></i>Thêm mã giảm giá</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
        </div>
        <div class="modal-body">
          <form id="couponForm">
            <input type="hidden" id="couponId">
            <div class="mb-3">
              <label class="form-label fw-semibold">Mã coupon <span class="text-danger">*</span></label>
              <input type="text" class="form-control coupon-code-input" id="inputCode" placeholder="VD: SALE20" maxlength="20" required>
            </div>
            <div class="row mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold">Loại giảm giá <span class="text-danger">*</span></label>
                <select class="form-select" id="inputType" title="Chọn loại giảm giá" required>
                  <option value="percent">Giảm theo %</option>
                  <option value="fixed">Giảm số tiền cố định (VNĐ)</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Giá trị <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="inputValue" min="1" required placeholder="VD: 10">
                <small class="text-muted" id="valueHint">% giảm giá (1-100)</small>
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold">Giảm tối đa (VNĐ)</label>
                <input type="text" class="form-control currency-input" id="inputMaxDiscount" placeholder="VD: 50.000" inputmode="numeric">
                <small class="text-muted">Chỉ cho loại %. Để 0 = không giới hạn</small>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Đơn tối thiểu (VNĐ)</label>
                <input type="text" class="form-control currency-input" id="inputMinOrder" placeholder="VD: 100.000" inputmode="numeric">
              </div>
            </div>
            <div class="row mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold">Giới hạn lượt dùng</label>
                <input type="number" class="form-control" id="inputUsageLimit" min="1" value="50" placeholder="VD: 50">
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold">Ngày hết hạn <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="inputExpiry" required placeholder="dd/mm/yyyy" title="Chọn ngày hết hạn">
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Mô tả</label>
              <input type="text" class="form-control" id="inputDescription" placeholder="VD: Giảm 10% tối đa 50k cho đơn từ 100k">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="button" class="btn btn-primary" id="btnSaveCoupon"><i class="fas fa-save me-1"></i>Lưu</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../assets/js/storage-service.js"></script>
  <script src="../assets/js/app-core.js"></script>
  <script src="../assets/js/admin-layout.js"></script>
  <script src="../assets/js/admin-coupons.js"></script>
</body>
</html>
