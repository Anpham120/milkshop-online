<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý đơn hàng — MilkShop Admin</title>
  <meta name="description" content="Quản lý và theo dõi đơn hàng — MilkShop Admin">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="../assets/css/common.css" rel="stylesheet">
  <link href="../assets/css/admin.css" rel="stylesheet">
</head>
<body>

  <div class="admin-wrapper">

    <div class="admin-main">

      <div class="admin-content">

        <!-- Stats -->
        <div class="row g-4 mb-4">
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="orderTotal">0</div>
                <div class="admin-stat-label">Tổng đơn hàng</div>
              </div>
              <div class="admin-stat-icon bg-blue"><i class="fas fa-receipt"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="orderRevenue">0₫</div>
                <div class="admin-stat-label">Tổng doanh thu</div>
              </div>
              <div class="admin-stat-icon bg-green"><i class="fas fa-coins"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="orderItems">0</div>
                <div class="admin-stat-label">Tổng sản phẩm bán</div>
              </div>
              <div class="admin-stat-icon bg-amber"><i class="fas fa-box"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="orderAvg">0₫</div>
                <div class="admin-stat-label">Giá trị TB / đơn</div>
              </div>
              <div class="admin-stat-icon bg-purple"><i class="fas fa-chart-line"></i></div>
            </div>
          </div>
        </div>

        <!-- Order list -->
        <div class="admin-table-card">
          <div class="admin-table-header">
            <h6><i class="fas fa-receipt me-2"></i>Danh sách đơn hàng</h6>
            <div class="admin-table-toolbar">
              <div class="admin-search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" class="admin-search-input" id="searchOrder" placeholder="Tìm mã đơn hàng...">
              </div>
              <button class="btn btn-sm btn-outline-danger" id="btnClearOrders">
                <i class="fas fa-trash me-1"></i>Xóa tất cả
              </button>
            </div>
          </div>

          <div class="admin-table-scroll">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Mã đơn</th>
                  <th>Ngày đặt</th>
                  <th>Khách hàng</th>
                  <th>Sản phẩm</th>
                  <th>Tổng tiền</th>
                  <th>Thanh toán</th>
                  <th class="admin-th-actions">Xóa</th>
                </tr>
              </thead>
              <tbody id="orderTableBody">
                <tr><td colspan="8" class="text-center text-muted py-4">Đang tải...</td></tr>
              </tbody>
            </table>
          </div>

          <div class="admin-table-footer">
            <span id="orderInfo">Hiển thị 0 đơn hàng</span>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../assets/js/storage-service.js"></script>
  <script src="../assets/js/app-core.js"></script>
  <script src="../assets/js/admin-layout.js"></script>
  <script src="../assets/js/admin-orders.js"></script>
</body>
</html>
