<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý sản phẩm — MilkShop Admin</title>
  <meta name="description" content="Quản lý danh sách sản phẩm, thêm mới và cập nhật thông tin sản phẩm — MilkShop Admin">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="../assets/css/common.css" rel="stylesheet">
  <link href="../assets/css/admin.css" rel="stylesheet">
</head>
<body>

  <div class="admin-wrapper">

    <div class="admin-main">

      <div class="admin-content">

        <!-- Stat cards -->
        <div class="row g-4 mb-4">
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statTotal">0</div>
                <div class="admin-stat-label">Tổng sản phẩm</div>
              </div>
              <div class="admin-stat-icon bg-blue"><i class="fas fa-box"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statConHang">0</div>
                <div class="admin-stat-label">Còn hàng</div>
              </div>
              <div class="admin-stat-icon bg-green"><i class="fas fa-check-circle"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statHetHang">0</div>
                <div class="admin-stat-label">Hết hàng</div>
              </div>
              <div class="admin-stat-icon bg-red"><i class="fas fa-times-circle"></i></div>
            </div>
          </div>
          <div class="col-xl-3 col-sm-6">
            <div class="admin-stat-card">
              <div>
                <div class="admin-stat-value" id="statCategories">0</div>
                <div class="admin-stat-label">Danh mục</div>
              </div>
              <div class="admin-stat-icon bg-amber"><i class="fas fa-tags"></i></div>
            </div>
          </div>
        </div>

        <!-- Data Table -->
        <div class="admin-table-card">
          <div class="admin-table-header">
            <h6><i class="fas fa-box me-2"></i>Danh sách sản phẩm</h6>
            <div class="admin-table-toolbar">
              <div class="admin-search-wrap">
                <i class="fas fa-search"></i>
                <input type="text" class="admin-search-input" id="searchInput" placeholder="Tìm kiếm sản phẩm...">
              </div>
              <select class="form-select form-select-sm admin-filter-select" id="filterCategory" aria-label="Lọc theo danh mục">
                <option value="">Tất cả danh mục</option>
                <option value="Sữa tươi">Sữa tươi</option>
                <option value="Sữa bột">Sữa bột</option>
                <option value="Sữa chua">Sữa chua</option>
                <option value="Sữa hạt">Sữa hạt</option>
              </select>
              <select class="form-select form-select-sm admin-filter-select" id="filterStatus" aria-label="Lọc theo trạng thái">
                <option value="">Tất cả trạng thái</option>
                <option value="Còn hàng">Còn hàng</option>
                <option value="Hết hàng">Hết hàng</option>
              </select>
              <button class="btn-admin-primary" id="btnAddProduct">
                <i class="fas fa-plus"></i> Thêm sản phẩm
              </button>
            </div>
          </div>

          <div class="admin-table-scroll">
            <table class="admin-table">
              <thead>
                <tr>
                  <th class="admin-th-num">#</th>
                  <th>Sản phẩm</th>
                  <th>Danh mục</th>
                  <th>Giá</th>
                  <th>NSX</th>
                  <th>HSD</th>
                  <th>Trạng thái</th>
                  <th>Tồn kho</th>
                  <th>Giảm giá</th>
                  <th class="admin-th-actions">Thao tác</th>
                </tr>
              </thead>
              <tbody id="productTableBody">
                <tr><td colspan="10" class="text-center text-muted py-4">Đang tải...</td></tr>
              </tbody>
            </table>
          </div>

          <div class="admin-table-footer">
            <span id="tableInfo">Hiển thị 0 sản phẩm</span>
            <nav>
              <ul class="pagination pagination-sm mb-0" id="tablePagination"></ul>
            </nav>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Modal Thêm/Sửa sản phẩm -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle"><i class="fas fa-plus-circle me-2"></i>Thêm sản phẩm</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
        </div>
        <div class="modal-body">
          <form id="productForm">
            <input type="hidden" id="productId">
            <div class="mb-3">
              <label class="form-label fw-semibold" for="productName">Tên sản phẩm <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="productName" placeholder="VD: Sữa tươi Vinamilk 1L">
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold" for="productCategory">Danh mục <span class="text-danger">*</span></label>
                <select class="form-select" id="productCategory" aria-label="Chọn danh mục">
                  <option value="">Chọn danh mục</option>
                  <option value="Sữa tươi">Sữa tươi</option>
                  <option value="Sữa bột">Sữa bột</option>
                  <option value="Sữa chua">Sữa chua</option>
                  <option value="Sữa hạt">Sữa hạt</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold" for="productPrice">Giá (₫) <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="productPrice" placeholder="VD: 35.000" inputmode="numeric">
              </div>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold" for="productMfgDate">Ngày sản xuất <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="productMfgDate" title="Ngày sản xuất">
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold" for="productDeadline">Hạn sử dụng <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="productDeadline" title="Hạn sử dụng">
              </div>
            </div>
              <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold" for="productStatus">Trạng thái</label>
                <select class="form-select" id="productStatus" aria-label="Chọn trạng thái">
                  <option value="Còn hàng">Còn hàng</option>
                  <option value="Hết hàng">Hết hàng</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label fw-semibold" for="productStock">Tồn kho <span class="text-danger">*</span></label>
                <input type="number" class="form-control" id="productStock" placeholder="VD: 50" min="0" inputmode="numeric">
              </div>
            </div>
            <div class="row g-3 mb-3">
              <div class="col-6">
                <label class="form-label fw-semibold" for="productDiscount">Giảm giá (%)</label>
                <input type="number" class="form-control" id="productDiscount" placeholder="VD: 20" min="0" max="90" value="0" inputmode="numeric">
                <small class="text-muted">Nhập 0 nếu không giảm giá</small>
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" for="productDescription">Mô tả</label>
              <textarea class="form-control" id="productDescription" rows="2" placeholder="Mô tả ngắn..."></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold" for="productImage">Ảnh sản phẩm (URL)</label>
              <input type="text" class="form-control" id="productImage" placeholder="VD: assets/img/product.jpg">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button type="button" class="btn btn-primary" id="btnSaveProduct">
            <i class="fas fa-save me-1"></i>Lưu sản phẩm
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../assets/js/storage-service.js"></script>
  <script src="../assets/js/app-core.js"></script>
  <script src="../assets/js/admin-layout.js"></script>
  <script src="../assets/js/admin-products.js"></script>
</body>
</html>
