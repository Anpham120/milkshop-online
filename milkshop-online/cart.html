<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giỏ hàng / Đơn hàng — MilkShop</title>
  <meta name="description" content="Giỏ hàng và quản lý đơn hàng tại MilkShop Online">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="assets/css/common.css" rel="stylesheet">
  <link href="assets/css/cart.css" rel="stylesheet">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <!-- Tiêu đề trang — thay đổi theo vai trò (bởi JS) -->
  <div class="page-header page-header-bg-2" id="pageHeader">
    <div class="page-header-overlay"></div>
    <div class="container page-header-content">
      <h1 id="pageTitle"><i class="fas fa-shopping-cart me-2"></i>Giỏ hàng</h1>
      <nav aria-label="breadcrumb">
        <ol class="breadcrumb justify-content-center mb-0">
          <li class="breadcrumb-item"><a href="index.html"><i class="fas fa-home me-1"></i>Trang chủ</a></li>
          <li class="breadcrumb-item active" id="pageBreadcrumb">Giỏ hàng</li>
        </ol>
      </nav>
    </div>
  </div>

  <!-- Nội dung khách hàng: Giỏ hàng -->
  <div class="container mb-5 view-hidden" id="customerView">
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="cart-items-card" id="cartItemsCard">
          <div class="cart-header">
            <h5><i class="fas fa-list me-2"></i>Sản phẩm trong giỏ (<span id="cartItemCount">0</span>)</h5>
            <button class="btn btn-sm btn-outline-danger" id="btnClearCart">
              <i class="fas fa-trash me-1"></i>Xóa tất cả
            </button>
          </div>
          <div id="cartItems"></div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="order-summary-card">
          <h5 class="mb-4"><i class="fas fa-receipt me-2"></i>Tổng đơn hàng</h5>
          <div class="summary-row">
            <span>Tạm tính</span>
            <span id="subtotalDisplay">0</span>
          </div>
          <div class="summary-row">
            <span>Phí vận chuyển</span>
            <span class="text-success">Miễn phí</span>
          </div>

          <!-- Mã giảm giá -->
          <div class="coupon-section">
            <label class="coupon-label"><i class="fas fa-ticket-alt me-1"></i>Mã giảm giá</label>
            <div class="coupon-input-group">
              <input type="text" id="couponInput" class="coupon-input" placeholder="Nhập mã giảm giá..." maxlength="20" autocomplete="off">
              <button class="coupon-btn" id="btnApplyCoupon"><i class="fas fa-check me-1"></i>Áp dụng</button>
            </div>
            <!-- Đề xuất mã coupon -->
            <div id="couponSuggestions" class="coupon-suggestions"></div>
            <div id="couponResult"></div>
          </div>

          <!-- Dòng giảm giá (ẩn mặc định) -->
          <div class="summary-row discount-row d-none" id="discountRow">
            <span><i class="fas fa-tag me-1"></i>Giảm giá</span>
            <span class="text-success" id="discountDisplay">-0</span>
          </div>

          <hr>
          <div class="summary-row summary-total">
            <span>Tổng cộng</span>
            <span id="totalDisplay">0</span>
          </div>
          <button class="btn btn-primary-milkshop w-100 mt-3 py-2" id="btnPlaceOrder">
            <i class="fas fa-check-circle me-2"></i>Đặt hàng
          </button>
          <a href="products.html" class="btn btn-outline-milkshop w-100 mt-2">
            <i class="fas fa-arrow-left me-2"></i>Tiếp tục mua sắm
          </a>
        </div>
      </div>
    </div>
  </div>


  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/storage-service.js"></script>
  <script src="assets/js/app-core.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/cart.js"></script>
</body>
</html>
