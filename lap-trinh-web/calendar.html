<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lịch sản phẩm — MilkShop</title>
  <meta name="description" content="Xem lịch hạn sử dụng sản phẩm tại MilkShop Online">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="assets/css/common.css" rel="stylesheet">
  <link href="assets/css/calendar.css" rel="stylesheet">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <div class="page-header">
    <div class="container">
      <h1><i class="fas fa-calendar-alt me-2"></i>Lịch sản phẩm</h1>
      <p>Theo dõi hạn sử dụng sản phẩm theo lịch</p>
    </div>
  </div>

  <div class="container mb-5">
    <div class="calendar-nav">
      <button class="btn btn-outline-milkshop" id="btnPrevMonth" title="Tháng trước">
        <i class="fas fa-chevron-left"></i>
      </button>
      <h3 id="calendarTitle">Tháng 3, 2026</h3>
      <button class="btn btn-outline-milkshop" id="btnNextMonth" title="Tháng sau">
        <i class="fas fa-chevron-right"></i>
      </button>
      <button class="btn btn-sm btn-primary-milkshop ms-3" id="btnToday">Hôm nay</button>
    </div>

    <div class="calendar-card">
      <div class="calendar-header-row">
        <div class="calendar-day-name">CN</div>
        <div class="calendar-day-name">T2</div>
        <div class="calendar-day-name">T3</div>
        <div class="calendar-day-name">T4</div>
        <div class="calendar-day-name">T5</div>
        <div class="calendar-day-name">T6</div>
        <div class="calendar-day-name">T7</div>
      </div>
      <div class="calendar-body" id="calendarBody"></div>
    </div>

    <div class="calendar-legend">
      <div class="legend-item">
        <span class="legend-dot legend-dot-danger"></span>
        <span>Sắp hết hạn (trong 7 ngày)</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot legend-dot-warning"></span>
        <span>Sắp hết hạn (trong 30 ngày)</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot legend-dot-success"></span>
        <span>Còn hạn sử dụng</span>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/storageService.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/calendar.js"></script>
</body>
</html>
