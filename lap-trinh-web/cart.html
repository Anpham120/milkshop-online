<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Giỏ hàng / Đơn hàng — MilkShop</title>
  <meta name="description" content="Giỏ hàng và quản lý đơn hàng tại MilkShop Online">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="assets/css/common.css" rel="stylesheet">
  <link href="assets/css/cart.css" rel="stylesheet">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <!-- Tiêu đề trang — thay đổi theo vai trò (bởi JS) -->
  <div class="page-header" id="pageHeader">
    <div class="container">
      <h1 id="pageTitle"><i class="fas fa-shopping-cart me-2"></i>Giỏ hàng</h1>
      <p id="pageDesc">Quản lý các sản phẩm bạn đã chọn mua</p>
    </div>
  </div>

  <!-- Nội dung khách hàng: Giỏ hàng -->
  <div class="container mb-5 view-hidden" id="customerView">
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="cart-items-card" id="cartItemsCard">
          <div class="cart-header">
            <h5><i class="fas fa-list me-2"></i>Sản phẩm trong giỏ (<span id="cartItemCount">0</span>)</h5>
            <button class="btn btn-sm btn-outline-danger" id="btnClearCart">
              <i class="fas fa-trash me-1"></i>Xóa tất cả
            </button>
          </div>
          <div id="cartItems"></div>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="order-summary-card">
          <h5 class="mb-4"><i class="fas fa-receipt me-2"></i>Tổng đơn hàng</h5>
          <div class="summary-row">
            <span>Tạm tính</span>
            <span id="subtotalDisplay">0</span>
          </div>
          <div class="summary-row">
            <span>Phí vận chuyển</span>
            <span class="text-success">Miễn phí</span>
          </div>
          <hr>
          <div class="summary-row summary-total">
            <span>Tổng cộng</span>
            <span id="totalDisplay">0</span>
          </div>
          <button class="btn btn-primary-milkshop w-100 mt-3 py-2" id="btnPlaceOrder">
            <i class="fas fa-check-circle me-2"></i>Đặt hàng
          </button>
          <a href="products.html" class="btn btn-outline-milkshop w-100 mt-2">
            <i class="fas fa-arrow-left me-2"></i>Tiếp tục mua sắm
          </a>
        </div>
      </div>
    </div>
  </div>

  <!-- Nội dung admin: Quản lý đơn hàng -->
  <div class="container mb-5 view-hidden" id="adminView">
    <div class="row g-4">
      <!-- Thẻ thống kê đơn hàng -->
      <div class="col-md-4">
        <div class="stat-card stat-card-primary fade-in order-stat-card">
          <div class="stat-icon"><i class="fas fa-receipt"></i></div>
          <div class="stat-value" id="orderTotal">0</div>
          <div class="stat-label">Tổng đơn hàng</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card stat-card-success fade-in order-stat-card">
          <div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div>
          <div class="stat-value" id="orderRevenue">0 đ</div>
          <div class="stat-label">Tổng doanh thu</div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card stat-card-warning fade-in order-stat-card">
          <div class="stat-icon"><i class="fas fa-box"></i></div>
          <div class="stat-value" id="orderItems">0</div>
          <div class="stat-label">Sản phẩm đã bán</div>
        </div>
      </div>

      <!-- Danh sách đơn hàng -->
      <div class="col-12">
        <div class="cart-items-card">
          <div class="cart-header">
            <h5><i class="fas fa-clipboard-list me-2"></i>Danh sách đơn hàng</h5>
            <button class="btn btn-sm btn-outline-danger" id="btnClearOrders">
              <i class="fas fa-trash me-1"></i>Xóa tất cả đơn
            </button>
          </div>
          <div id="orderList"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/storageService.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/cart.js"></script>
</body>
</html>
