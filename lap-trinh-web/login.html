<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập — MilkShop</title>
  <meta name="description" content="Đăng nhập vào hệ thống quản lý MilkShop Online">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link href="assets/css/common.css" rel="stylesheet">
  <link href="assets/css/login.css" rel="stylesheet">
</head>
<body class="login-body">

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-logo">MilkShop</h1>
        <p>Đăng nhập vào hệ thống quản lý bán sữa</p>
      </div>

      <form id="loginForm" novalidate>
        <div class="mb-3">
          <label for="loginUsername" class="form-label-milkshop">Tên đăng nhập</label>
          <div class="input-group-login">
            <i class="fas fa-user"></i>
            <input type="text" class="form-control-milkshop" id="loginUsername" placeholder="Nhập tên đăng nhập" required>
          </div>
          <div class="invalid-feedback-milkshop" id="usernameError">Vui lòng nhập tên đăng nhập</div>
        </div>

        <div class="mb-4">
          <label for="loginPassword" class="form-label-milkshop">Mật khẩu</label>
          <div class="input-group-login">
            <i class="fas fa-lock"></i>
            <input type="password" class="form-control-milkshop" id="loginPassword" placeholder="Nhập mật khẩu" required>
            <button type="button" class="btn-toggle-password" id="btnTogglePassword" title="Hiện/ẩn mật khẩu">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <div class="invalid-feedback-milkshop" id="passwordError">Vui lòng nhập mật khẩu</div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label login-remember-label" for="rememberMe">Ghi nhớ</label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary-milkshop w-100 py-2" id="btnLogin">
          <i class="fas fa-sign-in-alt me-2"></i>Đăng nhập
        </button>
      </form>

      <div class="login-hint">
        <p><i class="fas fa-user-shield me-1"></i> Admin: <strong>admin</strong> / <strong>123456</strong></p>
        <p class="mb-0"><i class="fas fa-user me-1"></i> Khách: <strong>khach</strong> / <strong>123456</strong></p>
      </div>
    </div>

    <div class="login-decoration">
      <div class="decoration-circle decoration-circle-1"></div>
      <div class="decoration-circle decoration-circle-2"></div>
      <div class="decoration-circle decoration-circle-3"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
